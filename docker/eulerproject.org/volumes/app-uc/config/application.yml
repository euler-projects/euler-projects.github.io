spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_OAUTH2_CLIENT_ID}
            client-secret: ${GOOGLE_OAUTH2_CLIENT_SECRET}
            client-name: Google
            scope:
              - openid
              - profile
              - email

euler:
  application:
    runtime-path: /var/lib/${spring.application.name}
    temp-path: /var/tmp/${spring.application.name}
  data:
    jpa:
      encryption:
        primary-alg: AES-256-GCM
        keys:
          dev:
            kid: euler-00
            alg: AES-256-GCM
            primary: true
            key-file: '/app/jpa/encryption.key'
  security:
    web:
      login-methods:
        google:
          type: oauth2
          properties:
            identity-type: google
            oauth-client-registration-id: google
            auto-create-user: true
            default-authorities:
              - user
    app-attest:
      enabled: true
      development-environment: true
    oauth2:
      authorizationserver:
        jwk:
          keys:
            euler-00:
              kid: 'euler-00'
              alg: RS256
              use: sig
              status: ACTIVE
              iat: '2026-01-01T00:00:00Z'
              key-file: 'file:///app/oauth2/jwk.pem'
