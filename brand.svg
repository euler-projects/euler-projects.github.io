<?xml version="1.0" encoding="UTF-8"?>
<!--
  Euler Project brand mark.

  A filled disc (r=12 in a 24×24 viewBox) with a logarithmic-spiral
  snail shell punched out. Four arcs of radii 8φ → 8 → 5 → 3, each
  shrinking by exactly 1/φ per turn — a discrete sampling of the
  log-spiral r = a·e^(θ/2π), a nod to Euler's namesake constant.

  Segments 1–3 are complete half-circles; segment 0 is the outward
  extension whose r = 8φ ≈ 12.94 circle intersects the disc at the
  point x = 20 − 5φ ≈ 11.91, y ≈ 24. The mask stroke does NOT start
  at that crossing, though — it starts 12° farther along the same
  segment-0 circle, at (9.30, 24.75), which sits outside both the
  disc and the viewBox. That way the stroke's `round` line-cap and
  its curved lead-in are entirely off-canvas, and where the stroke
  first passes into the disc it does so as an unadorned middle
  section. The resulting cut-edge along the disc rim is exactly an
  arc of the outer circle (r=12), so the spiral's tail meets the disc
  boundary cleanly — the boundary carries the mark's own curve, no
  half-moon lump from a stray line-cap.

  Disc fill uses `currentColor` — set CSS `color` on any ancestor
  (or on the <svg> itself) to theme the mark. The mask's black/white
  values are luminance-mask semantics ("erase" / "keep") and must
  stay literal, they never render to screen.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-labelledby="euler-brand-title">
    <title id="euler-brand-title">Euler Project</title>
    <defs>
        <mask id="euler-brand-mask">
            <circle cx="12" cy="12" r="12" fill="white"/>
            <path d="M 9.3 24.75 A 12.94 12.94 0 0 0 20 12 A 8 8 0 1 0 4 12 A 5 5 0 1 0 14 12 A 3 3 0 1 0 8 12"
                  fill="none" stroke="black" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round"/>
        </mask>
    </defs>
    <circle cx="12" cy="12" r="12" fill="currentColor" mask="url(#euler-brand-mask)"/>
</svg>
